<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Waffles</title>
    <link rel="icon" type="image/svg+xml" href="/assets/waffle-favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/gallery.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div id="content" class="visible">
        <a href="https://hackclub.com/" class="flag-link"><img style="border: 0; width: 256px; display: block;" src="/assets/flag.svg" alt="Hack Club"/></a>
        <nav>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/requirements/" class="nav-link">Requirements</a>
                <a href="/gallery/" class="nav-link">Gallery</a>
                <a href="/resources/" class="nav-link">Resources</a>
            </div>
        </nav>

        <section class="gallery-hero">
            <h1 class="gallery-title">Project Gallery</h1>
            <p class="gallery-subtitle">These are some sites built by Hack Clubbers for Waffles! Have a look :]</p>
        </section>

        <section class="gallery-content">
            <div id="projects-grid" class="projects-grid">
                <div class="projects-loading">
                    <div class="loading-spinner"></div>
                    <span>Loading projects...</span>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="/scripts/gallery.js"></script>
</body>
</html>
